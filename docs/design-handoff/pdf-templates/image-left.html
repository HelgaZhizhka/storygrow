<section class="page page--image-left">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Outfit:wght@400;500;600&display=swap');

    .page--image-left {
      display: flex;
      flex-direction: row;
      width: 874px;
      height: 1240px;
      font-family: 'Outfit', 'Helvetica', sans-serif;
      background: oklch(0.986 0.012 250);
    }
    .page--image-left__illustration {
      width: 48%;
      height: 100%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .page--image-left__text-block {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 32px;
      padding: 56px 52px;
    }
    /* soft seam shadow where art meets paper */
    .page--image-left__text-block::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 40px;
      height: 100%;
      background: linear-gradient(to right, rgba(40, 30, 80, 0.1), transparent);
    }
    .page--image-left__mark {
      width: 22px;
      height: 22px;
      background: oklch(0.74 0.13 268);
      opacity: 0.6;
      clip-path: polygon(50% 0%, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0% 50%, 40% 40%);
    }
    .page--image-left__text {
      margin: 0;
      font-size: 27px;
      font-weight: 500;
      line-height: 1.66;
      letter-spacing: -0.005em;
      color: oklch(0.33 0.035 272);
      text-wrap: pretty;
    }
  </style>

  <img
    class="page--image-left__illustration"
    src="{{illustrationUrl}}"
    alt="{{illustrationPrompt}}"
  />
  <div class="page--image-left__text-block">
    <span class="page--image-left__mark"></span>
    <p class="page--image-left__text">{{text}}</p>
  </div>
</section>
