<section class="page page--image-top">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Outfit:wght@400;500;600&display=swap');

    .page--image-top {
      display: flex;
      flex-direction: column;
      width: 874px;
      height: 1240px;
      font-family: 'Outfit', 'Helvetica', sans-serif;
      background: oklch(0.986 0.012 250);
    }
    .page--image-top__illustration {
      width: 100%;
      height: 58%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .page--image-top__text-block {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 44px 64px 56px;
      text-align: center;
    }
    .page--image-top__text {
      margin: 0;
      font-size: 30px;
      font-weight: 500;
      line-height: 1.62;
      letter-spacing: -0.005em;
      color: oklch(0.33 0.035 272);
      text-wrap: pretty;
      max-width: 30ch;
    }
    .page--image-top__ornament {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      background: oklch(0.74 0.13 268);
      opacity: 0.55;
      clip-path: polygon(50% 0%, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0% 50%, 40% 40%);
    }
  </style>

  <img
    class="page--image-top__illustration"
    src="{{illustrationUrl}}"
    alt="{{illustrationPrompt}}"
  />
  <div class="page--image-top__text-block">
    <p class="page--image-top__text">{{text}}</p>
    <span class="page--image-top__ornament"></span>
  </div>
</section>
