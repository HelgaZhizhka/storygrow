<section class="page page--final">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Outfit:wght@400;500;600;700&display=swap');

    .page--final {
      display: flex;
      flex-direction: row;
      width: 874px;
      height: 1240px;
      font-family: 'Outfit', 'Helvetica', sans-serif;
    }
    .page--final__content {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 64px 44px 56px 56px;
      background: oklch(0.986 0.012 250);
      overflow: hidden;
    }
    .page--final__wordmark {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 36px;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: oklch(0.5 0.16 268);
    }
    .page--final__spark {
      width: 16px;
      height: 16px;
      background: oklch(0.78 0.13 75);
      clip-path: polygon(50% 0%, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0% 50%, 40% 40%);
    }
    .page--final__moral-label {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: oklch(0.62 0.1 75);
    }
    .page--final__moral {
      margin: 0 0 40px;
      font-family: 'Bricolage Grotesque', 'Helvetica', sans-serif;
      font-size: 30px;
      font-weight: 700;
      line-height: 1.32;
      letter-spacing: -0.015em;
      color: oklch(0.32 0.04 272);
      text-wrap: pretty;
    }
    .page--final__divider {
      width: 72px;
      height: 4px;
      border-radius: 999px;
      margin-bottom: 36px;
      background: linear-gradient(90deg, oklch(0.62 0.16 268), oklch(0.74 0.12 190));
    }
    .page--final__questions-label {
      margin: 0 0 20px;
      font-size: 16px;
      font-weight: 700;
      color: oklch(0.5 0.16 268);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }
    .page--final__questions {
      margin: 0;
      padding: 0;
      list-style: none;
      counter-reset: q;
    }
    .page--final__questions li {
      position: relative;
      counter-increment: q;
      margin-bottom: 18px;
      padding-left: 46px;
      font-size: 19px;
      font-weight: 500;
      line-height: 1.5;
      color: oklch(0.4 0.03 272);
    }
    .page--final__questions li::before {
      content: counter(q);
      position: absolute;
      left: 0;
      top: -2px;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      background: linear-gradient(135deg, oklch(0.6 0.17 268), oklch(0.66 0.14 300));
    }
    .page--final__illustration {
      width: 38%;
      height: 100%;
      object-fit: cover;
      flex-shrink: 0;
    }
  </style>

  <div class="page--final__content">
    <div class="page--final__wordmark">
      <span class="page--final__spark"></span>
      StoryGrow
    </div>
    <p class="page--final__moral-label">Чему учит история</p>
    <p class="page--final__moral">{{text}}</p>
    <div class="page--final__divider"></div>
    <p class="page--final__questions-label">Вопросы для обсуждения</p>
    <ol class="page--final__questions">
      {{discussionQuestionsHtml}}
    </ol>
  </div>
  <img class="page--final__illustration" src="{{illustrationUrl}}" alt="{{illustrationPrompt}}" />
</section>
