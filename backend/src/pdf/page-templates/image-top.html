<section class="page page--image-top">
  <style>
    .page--image-top {
      display: flex;
      flex-direction: column;
      width: 874px;
      height: 1240px;
      font-family: inherit;
    }
    .page--image-top__illustration {
      width: 100%;
      height: 60%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .page--image-top__text-block {
      flex: 1;
      display: flex;
      align-items: center;
      padding: 32px 48px;
      background: #fefce8;
    }
    .page--image-top__text {
      margin: 0;
      font-size: 28px;
      line-height: 1.6;
      color: #1c1917;
    }
  </style>

  <img
    class="page--image-top__illustration"
    src="{{illustrationUrl}}"
    alt="{{illustrationPrompt}}"
  />
  <div class="page--image-top__text-block">
    <p class="page--image-top__text">{{text}}</p>
  </div>
</section>
