<section class="page page--image-bottom">
  <style>
    .page--image-bottom {
      display: flex;
      flex-direction: column;
      width: 874px;
      height: 1240px;
      font-family: 'Literata', 'Helvetica', sans-serif;
      background: oklch(0.986 0.012 250);
    }
    .page--image-bottom__text-block {
      position: relative;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 56px 64px 44px;
      text-align: center;
    }
    .page--image-bottom__ornament {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      background: oklch(0.74 0.13 268);
      opacity: 0.55;
      clip-path: polygon(50% 0%, 60% 40%, 100% 50%, 60% 60%, 50% 100%, 40% 60%, 0% 50%, 40% 40%);
    }
    .page--image-bottom__text {
      margin: 0;
      font-size: 30px;
      font-weight: 500;
      line-height: 1.62;
      letter-spacing: -0.005em;
      color: oklch(0.33 0.035 272);
      text-wrap: pretty;
      max-width: 30ch;
    }
    .page--image-bottom__illustration {
      width: 100%;
      height: 55%;
      object-fit: cover;
      flex-shrink: 0;
    }
  </style>

  <div class="page--image-bottom__text-block">
    <span class="page--image-bottom__ornament"></span>
    <p class="page--image-bottom__text">{{text}}</p>
  </div>
  <img
    class="page--image-bottom__illustration"
    src="{{illustrationUrl}}"
    alt="{{illustrationPrompt}}"
  />
</section>
