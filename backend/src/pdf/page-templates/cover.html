<section class="page page--cover">
  <style>
    .page--cover {
      position: relative;
      width: 874px;
      height: 1240px;
      overflow: hidden;
      font-family: inherit;
    }
    .page--cover__illustration {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .page--cover__title-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 32px 40px;
      background: linear-gradient(transparent, rgba(0, 0, 0, 0.65));
    }
    .page--cover__title {
      margin: 0;
      font-size: 48px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.2;
    }
  </style>

  <img class="page--cover__illustration" src="{{illustrationUrl}}" alt="{{illustrationPrompt}}" />
  <div class="page--cover__title-bar">
    <h1 class="page--cover__title">{{title}}</h1>
  </div>
</section>
