<section class="page page--final">
  <style>
    .page--final {
      display: flex;
      flex-direction: row;
      width: 874px;
      height: 1240px;
      font-family: inherit;
    }
    .page--final__content {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 48px 40px 48px 48px;
      background: #fefce8;
      overflow: hidden;
    }
    .page--final__moral {
      margin: 0 0 32px;
      font-size: 24px;
      font-weight: 600;
      line-height: 1.5;
      color: #1c1917;
    }
    .page--final__questions-label {
      margin: 0 0 16px;
      font-size: 18px;
      font-weight: 700;
      color: #78350f;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .page--final__questions {
      margin: 0;
      padding-left: 20px;
      font-size: 18px;
      line-height: 1.7;
      color: #292524;
    }
    .page--final__questions li {
      margin-bottom: 12px;
    }
    .page--final__illustration {
      width: 38%;
      height: 100%;
      object-fit: cover;
      flex-shrink: 0;
    }
  </style>

  <div class="page--final__content">
    <p class="page--final__moral">{{text}}</p>
    <p class="page--final__questions-label">Вопросы для обсуждения</p>
    <ol class="page--final__questions">
      {{discussionQuestionsHtml}}
    </ol>
  </div>
  <img class="page--final__illustration" src="{{illustrationUrl}}" alt="{{illustrationPrompt}}" />
</section>
