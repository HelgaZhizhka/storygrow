name: storygrow

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: storygrow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-storygrow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-storygrow}
      POSTGRES_DB: ${POSTGRES_DB:-storygrow}
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-storygrow}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: storygrow-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: storygrow-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-storygrow}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-storygrow-dev-secret}
    command: server /data --console-address ':9001'
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio-data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 10

  minio-create-buckets:
    image: minio/mc:latest
    container_name: storygrow-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-storygrow} ${S3_SECRET_KEY:-storygrow-dev-secret} &&
      mc mb --ignore-existing local/${S3_BUCKET:-storygrow} &&
      mc anonymous set download local/${S3_BUCKET:-storygrow} &&
      echo 'bucket ready';
      "

  langfuse:
    image: langfuse/langfuse:2
    container_name: storygrow-langfuse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-storygrow}:${POSTGRES_PASSWORD:-storygrow}@postgres:5432/langfuse
      NEXTAUTH_URL: http://localhost:3030
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-dev-secret-change-me}
      SALT: ${LANGFUSE_SALT:-dev-salt-change-me}
      TELEMETRY_ENABLED: 'false'
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-storygrow}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-StoryGrow}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-storygrow}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-StoryGrow}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@storygrow.local}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-StoryGrow Admin}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-changeme123}
    ports:
      - '3030:3000'

volumes:
  postgres-data:
  redis-data:
  minio-data:
